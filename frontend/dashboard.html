<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div id="loader" style="
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    color: white;
    font-size: 18px;
">
    <div class="spinner"></div>
    <p>⏳ Waking server... please wait</p>
</div>
<div class="dashboard">

    <div class="header">
        <h2>Daily Health Tracker</h2>
    </div>
    
    <div class="stats">

    <div class="stat-card">
        <h3>🔥 Streak</h3>
        <p id="streak">0 days</p>
    </div>

    <div class="stat-card">
        <h3>📊 Today Progress</h3>
        <p id="progressText">0%</p>
        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>
    </div>

</div>

    <div class="tasks">

        <div class="task">
            <span>Exercise</span>
            <input type="checkbox" id="exercise">
        </div>

        <div class="task">
            <span>Medicine</span>
            <input type="checkbox" id="medicine">
        </div>

        <div class="task">
            <span>Diet Followed</span>
            <input type="checkbox" id="diet">
        </div>

        <div class="task">
            <span>Water Intake</span>
            <input type="checkbox" id="water">
        </div>

        <div class="task">
            <span>Sleep (7–8 hrs)</span>
            <input type="checkbox" id="sleep">
        </div>

    </div>

    <button class="save-btn" onclick="saveTasks()">Save Today</button>

    <button class="guide-btn" onclick="goToGuide()">View Health Guide</button>

    <h3 style="color:white; margin-top:20px;">Your Activity</h3>

    <div class="calendar" id="calendar"></div>

    <div class="day-details" id="dayDetails"></div>
    
    <button onclick="resetToday()">Reset Today</button>

</div>

<script src="script.js"></script>
</body>
</html>
